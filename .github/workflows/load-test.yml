name: Load Test

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Number of concurrent users"
        default: "50"
        required: false
      spawn_rate:
        description: "Users spawned per second"
        default: "5"
        required: false
      run_time:
        description: "Test duration (e.g. 5m, 10m, 1h)"
        default: "5m"
        required: false

jobs:
  load-test:
    name: Run Locust against staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: load_tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run Locust
        env:
          ENV: ci
          LOAD_TEST_TARGET_HOST: ${{ secrets.STAGING_TARGET_HOST }}
          LOAD_TEST_FARMER_EMAIL: ${{ secrets.STAGING_LOAD_TEST_FARMER_EMAIL }}
          LOAD_TEST_FARMER_PASSWORD: ${{ secrets.STAGING_LOAD_TEST_FARMER_PASSWORD }}
          LOAD_TEST_LOGISTICS_EMAIL: ${{ secrets.STAGING_LOAD_TEST_LOGISTICS_EMAIL }}
          LOAD_TEST_LOGISTICS_PASSWORD: ${{ secrets.STAGING_LOAD_TEST_LOGISTICS_PASSWORD }}
          LOAD_TEST_FACTORY_EMAIL: ${{ secrets.STAGING_LOAD_TEST_FACTORY_EMAIL }}
          LOAD_TEST_FACTORY_PASSWORD: ${{ secrets.STAGING_LOAD_TEST_FACTORY_PASSWORD }}
          LOAD_TEST_WAREHOUSE_EMAIL: ${{ secrets.STAGING_LOAD_TEST_WAREHOUSE_EMAIL }}
          LOAD_TEST_WAREHOUSE_PASSWORD: ${{ secrets.STAGING_LOAD_TEST_WAREHOUSE_PASSWORD }}
        run: |
          uv run locust \
            --headless \
            -u ${{ inputs.users }} \
            -r ${{ inputs.spawn_rate }} \
            -t ${{ inputs.run_time }} \
            --html report.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report-${{ github.run_id }}
          path: load_tests/report.html
          retention-days: 30
