substitutions:
  _SERVICE: arex-backend
  _REGION: asia-southeast1
  _CORS_ORIGINS: '["https://your-frontend.vercel.app"]'
  _SUPABASE_URL: https://your-project-ref.supabase.co
  _SUPABASE_PUBLISHABLE_KEY: your-publishable-key
  _SUPABASE_SECRET_KEY: SUPABASE_SECRET_KEY
  _SUPABASE_LEGACY_SERVICE_ROLE_JWT: SUPABASE_LEGACY_SERVICE_ROLE_JWT

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/$_SERVICE:$SHORT_SHA",
        "-t",
        "gcr.io/$PROJECT_ID/$_SERVICE:latest",
        "--target",
        "prod",
        ".",
      ]
    dir: backend

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "$_SERVICE",
        "--image",
        "gcr.io/$PROJECT_ID/$_SERVICE:$SHORT_SHA",
        "--platform",
        "managed",
        "--region",
        "$_REGION",
        "--allow-unauthenticated",
        "--port",
        "8000",
        "--set-env-vars",
        "APP_NAME=AREX Backend API,ENVIRONMENT=production,DEBUG=false,API_PREFIX=/api/v1,CORS_ORIGINS=$_CORS_ORIGINS,SUPABASE_URL=$_SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY=$_SUPABASE_PUBLISHABLE_KEY",
        "--set-secrets",
        "SUPABASE_SECRET_KEY=$_SUPABASE_SECRET_KEY:latest,SUPABASE_LEGACY_SERVICE_ROLE_JWT=$_SUPABASE_LEGACY_SERVICE_ROLE_JWT:latest",
      ]

images:
  - gcr.io/$PROJECT_ID/$_SERVICE:$SHORT_SHA
  - gcr.io/$PROJECT_ID/$_SERVICE:latest
