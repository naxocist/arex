services:
  backend-staging:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8001:8000"
    environment:
      ENVIRONMENT: staging
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    restart: always
