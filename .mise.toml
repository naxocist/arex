[tools]
node = "20"
python = "3.11"
uv = "latest"
supabase = "latest"

[env]
_.file = { path = "backend/supabase/.env.supabase", ignore_missing = true }

[tasks.setup]
description = "Install frontend and backend dependencies"
run = "npm install && cd backend && uv sync"

[tasks."db:start"]
description = "Start local Supabase stack"
run = "supabase start --workdir backend"

[tasks."db:stop"]
description = "Stop local Supabase stack"
run = "supabase stop --workdir backend"

[tasks."db:status"]
description = "Show local Supabase endpoints and keys"
run = "supabase status -o env --workdir backend"

[tasks."db:migrate:new"]
description = "Create a new migration (pass -- my_migration_name)"
run = "supabase migration new --workdir backend"

[tasks."db:reset"]
description = "Reset local database, reapply migrations, and seed data"
run = "supabase db reset --workdir backend"

[tasks."db:reseed"]
description = "Wipe and reseed local DB without reapplying migrations"
run = "docker exec -i supabase_db_arex-local psql -U postgres -d postgres < backend/supabase/seeds/seed.local.sql"

[tasks."db:push:staging"]
description = "Push unapplied migrations to staging Supabase"
run = "supabase link --project-ref %STAGING_PROJECT_REF% --password %STAGING_DB_PASSWORD% --workdir backend && supabase db push --workdir backend"

[tasks."db:reseed:staging"]
description = "WIPE staging DB and reseed from scratch using local seed (truncates all tables + auth users)"
run = "supabase link --project-ref %STAGING_PROJECT_REF% --password %STAGING_DB_PASSWORD% --workdir backend && cd backend && uv run python scripts/run_seed.py supabase/seeds/seed.local.sql"

[tasks."db:push:prod"]
description = "Push unapplied migrations to production Supabase"
run = "supabase link --project-ref %PROD_PROJECT_REF% --password %PROD_DB_PASSWORD% --workdir backend && supabase db push --workdir backend"

[tasks."db:reseed:prod"]
description = "CAUTION!: WIPE prod DB and reseed from scratch (truncates all tables + auth users)"
run = "supabase link --project-ref %PROD_PROJECT_REF% --password %PROD_DB_PASSWORD% --workdir backend && supabase db query --workdir backend --linked --file supabase/seeds/seed.prod.sql"

[tasks."db:diff"]
description = "Diff local schema vs current linked remote (shows what would be pushed)"
run = "supabase db diff --workdir backend"

[tasks."db:migration:list"]
description = "List migrations and their applied status on linked remote"
run = "supabase migration list --workdir backend"

[tasks."db:dump:auth"]
description = "Dump local auth data for cloud push"
run = "supabase db dump --workdir backend --local --data-only --schema auth -f supabase/dumps/local_auth_data.sql"
hide = true

[tasks."db:dump:public"]
description = "Dump local public data for cloud push"
run = "supabase db dump --workdir backend --local --data-only --schema public -f supabase/dumps/local_public_data.sql"
hide = true

[tasks."db:dump:cloud-push"]
description = "Dump local auth+public data files for cloud push"
run = "mise run db:dump:auth && mise run db:dump:public"

[tasks."dev:up"]
description = "Start Supabase and app containers"
run = "supabase start --workdir backend && docker compose up --build -d && docker compose watch"

[tasks."dev:down"]
description = "Stop app containers and Supabase"
run = "docker compose down --remove-orphans && supabase stop --workdir backend"

[tasks."logs:frontend"]
description = "Tail frontend container logs"
run = "docker compose logs -f frontend"

[tasks."logs:backend"]
description = "Tail backend container logs"
run = "docker compose logs -f backend"

[tasks."prod:up"]
description = "Build and start production containers on GCP VM (requires .env.prod)"
run = "cd backend && docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d"

[tasks."prod:down"]
description = "Stop production containers"
run = "cd backend && docker compose -f docker-compose.prod.yml down --remove-orphans"

[tasks."prod:logs"]
description = "Tail production logs"
run = "cd backend && docker compose -f docker-compose.prod.yml logs -f"

[tasks.check]
description = "Run frontend and backend checks"
run = "npx tsc --noEmit && npm run build && cd backend && uv run python -m compileall app scripts"
